<svg viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#bc8cff;#f78166;#58a6ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#bc8cff">
        <animate attributeName="stop-color" values="#bc8cff;#f78166;#58a6ff;#bc8cff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f78166">
        <animate attributeName="stop-color" values="#f78166;#58a6ff;#bc8cff;#f78166" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="750" height="250" rx="12" fill="url(#bgGrad)"/>

  <!-- Floating particles -->
  <circle r="3" fill="#58a6ff" opacity="0.6">
    <animateMotion path="M 80 80 Q 200 40 340 100 Q 480 160 600 80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#bc8cff" opacity="0.6">
    <animateMotion path="M 600 120 Q 450 60 340 100 Q 200 140 80 100" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Main name text -->
  <text x="330" y="125" text-anchor="middle" font-family="'Segoe UI', sans-serif"
        font-size="60" font-weight="600" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="6">
    KRUTHIK BT
    <animate attributeName="opacity" values="0;0;1;1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- Shimmer sweep -->
  <rect x="-200" y="60" width="120" height="80" rx="4" fill="white" opacity="0.06">
    <animateTransform attributeName="transform" type="translate" values="-200,0;900,0" dur="5s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Underline -->
  <rect x="200" y="140" width="0" height="3" rx="2" fill="url(#textGrad)">
    <animate attributeName="width" from="0" to="280" dur="0.8s" begin="1s" fill="freeze"/>
    <animate attributeName="x" from="340" to="200" dur="0.8s" begin="1s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="340" y="175" text-anchor="middle" font-family="'Segoe UI', sans-serif"
        font-size="14" fill="#8b949e" letter-spacing="4" opacity="0">
    &lt; AI Enthusiast / &gt;
    <animate attributeName="opacity" values="0;0;0;1" dur="2s" fill="freeze"/>
  </text>

  <!-- Border glow pulse -->
  <rect x="2" y="2" width="676" height="196" rx="11" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#58a6ff;#bc8cff;#f78166;#58a6ff" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
